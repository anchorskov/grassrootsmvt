<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Field Support | GrassrootsMVT</title>
  <script src="/config/environments.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 1rem; color: #0f172a; }
    .muted { color: #64748b; }
    .toolbar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; }
    button, a.button {
      border: 0;
      border-radius: 8px;
      padding: .65rem .9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary { background: #0ea5e9; color: #fff; }
    .secondary { background: #e2e8f0; color: #0f172a; }
    .card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin: 1rem 0; background: #fff; }
    .session-head { display: flex; gap: 1rem; justify-content: space-between; flex-wrap: wrap; }
    .status { font-weight: 700; }
    .ok { color: #15803d; }
    .warn { color: #b45309; }
    .error { color: #b91c1c; }
    .task { border-top: 1px solid #e2e8f0; padding-top: .75rem; margin-top: .75rem; }
    .task-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .5rem; }
    .task-meta { font-size: .85rem; color: #475569; margin-top: .35rem; }
    .empty { padding: 1rem; border: 1px dashed #cbd5e1; border-radius: 8px; color: #64748b; }
    .nearby-section { margin-top: 1rem; }
    .nearby-section h3 { margin-bottom: .4rem; }
    .nearby-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .nearby-table th { text-align: left; border-bottom: 2px solid #e2e8f0; padding: .3rem .5rem; color: #64748b; font-weight: 600; }
    .nearby-table td { padding: .4rem .5rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .nearby-table tr:hover td { background: #f8fafc; }
    .street-hint { font-size: .85rem; color: #475569; margin-bottom: .5rem; }
    .phone-link { color: #0ea5e9; text-decoration: none; font-weight: 600; }
    .no-phone { color: #94a3b8; font-style: italic; }
    .quick-task-btn { font-size: .78rem; padding: .25rem .5rem; border-radius: 5px; }
    .loading-nearby { color: #64748b; font-style: italic; font-size: .9rem; }
    .phone-summary { font-size: .82rem; color: #475569; margin: .35rem 0 .6rem; }
    .phone-badge { display: inline-block; padding: .1rem .45rem; border-radius: 4px; font-weight: 700; font-size: .78rem; margin-right: .3rem; }
    .badge-phone { background: #dcfce7; color: #15803d; }
    .badge-nophone { background: #f1f5f9; color: #64748b; }
    .match-method { font-size: .78rem; color: #94a3b8; margin-left: .4rem; }
  </style>
</head>
<body>
  <h1>Field Support</h1>
  <p class="muted">Active field sessions with latest shared location and support tasks.</p>

  <div class="toolbar">
    <button id="refreshBtn" class="primary" type="button" data-help="Refresh active sessions, tasks, and location freshness status now.">Refresh</button>
    <label class="muted" style="font-size:.9rem">Team
      <select id="teamFilter" style="margin-left:.4rem; padding:.35rem .55rem; border:1px solid #cbd5e1; border-radius:6px;">
        <option value="">All teams</option>
      </select>
    </label>
    <a class="button secondary" href="/admin/index.html" data-help="Return to the main admin dashboard.">Back to admin</a>
    <span id="countdown" class="muted" style="font-size:.85rem;align-self:center"></span>
  </div>

  <p id="status" class="status muted">Loading...</p>
  <div id="sessions"></div>

  <script src="/src/apiClient.v2.js?v=2025-10-30a"></script>
  <script src="/shared/authGlobal.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const sessionsEl = document.getElementById('sessions');
    const refreshBtn = document.getElementById('refreshBtn');
    const teamFilterEl = document.getElementById('teamFilter');
    const countdownEl = document.getElementById('countdown');
    const AUTO_REFRESH_MS = 5 * 60 * 1000;
    let autoRefreshTimer = null;
    let countdownInterval = null;
    let nextRefreshAt = null;
    let currentAdminEmail = '';

    function applyControlHelp(root = document) {
      root.querySelectorAll('button[data-help], a[data-help]').forEach(el => {
        const help = el.getAttribute('data-help');
        if (!help) return;
        if (!el.getAttribute('title')) {
          el.setAttribute('title', help);
        }
        if (!el.getAttribute('aria-label')) {
          const base = (el.textContent || '').trim();
          el.setAttribute('aria-label', base ? `${base}. ${help}` : help);
        }
      });
    }

    function setStatus(message, kind = 'muted') {
      statusEl.textContent = message;
      statusEl.className = `status ${kind}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return 'None';
      const date = new Date(String(value).replace(' ', 'T') + 'Z');
      return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
    }

    function minutesSince(value) {
      if (!value) return null;
      const date = new Date(String(value).replace(' ', 'T') + 'Z');
      if (Number.isNaN(date.getTime())) return null;
      return Math.floor((Date.now() - date.getTime()) / 60000);
    }

    function mapUrl(session) {
      if (session.latest_lat == null || session.latest_lng == null) return '';
      return `https://maps.google.com/?q=${encodeURIComponent(`${session.latest_lat},${session.latest_lng}`)}`;
    }

    function taskLabel(task) {
      const type = task.task_type === 'next_stop' ? 'Next stop' : 'Call ahead';
      return `${type}: ${task.title}`;
    }

    function renderTask(task) {
      const owner = task.assigned_support_email ? `Claimed by ${escapeHtml(task.assigned_support_email)}` : 'Unclaimed';
      const priority = task.priority ? `Priority: ${escapeHtml(task.priority)}` : '';
      const dueAt = task.due_at ? `Due: ${escapeHtml(task.due_at)}` : '';
      const metaBits = [owner, priority, dueAt].filter(Boolean).join(' | ');
      const version = Number(task.version || 1);
      const canClaim = !task.assigned_support_email;
      const isMine = currentAdminEmail && String(task.assigned_support_email || '').toLowerCase() === currentAdminEmail;
      return `
        <div class="task">
          <strong>${escapeHtml(taskLabel(task))}</strong>
          <div class="muted">Status: ${escapeHtml(task.status)}${task.scheduled_for ? ` | Scheduled: ${escapeHtml(task.scheduled_for)}` : ''}</div>
          <div class="task-meta">${metaBits || 'No assignment metadata'}</div>
          ${task.notes ? `<div>${escapeHtml(task.notes)}</div>` : ''}
          <div class="task-actions">
            ${canClaim ? `<button class="secondary" type="button" data-help="Claim this task for yourself so other supporters see it as owned."
              data-task-claim="${task.id}" data-task-version="${version}">Claim</button>` : ''}
            ${task.assigned_support_email ? `<button class="secondary" type="button" data-help="Release this task back to the open team queue."
              data-task-release="${task.id}" data-task-version="${version}">${isMine ? 'Release' : 'Force release'}</button>` : ''}
            <button class="secondary" type="button" data-help="Reassign this task to another support operator by email."
              data-task-reassign="${task.id}" data-task-version="${version}" data-task-assignee="${escapeHtml(task.assigned_support_email || '')}">Reassign</button>
            <button class="secondary" type="button" data-help="Mark this task as confirmed without closing it."
              data-task-status="confirmed" data-task-id="${task.id}" data-task-version="${version}">Confirm</button>
            <button class="secondary" type="button" data-help="Mark this task as completed."
              data-task-status="done" data-task-id="${task.id}" data-task-version="${version}">Done</button>
            <button class="secondary" type="button" data-help="Cancel this task so it leaves the active queue."
              data-task-status="cancelled" data-task-id="${task.id}" data-task-version="${version}">Cancel</button>
          </div>
        </div>
      `;
    }

    function renderSession(session) {
      const staleMinutes = minutesSince(session.latest_location_at);
      const isStale = staleMinutes !== null && staleMinutes > 30;
      const locationText = session.sharing_enabled
        ? `${session.latest_lat ?? '-'}, ${session.latest_lng ?? '-'}`
        : 'Not sharing';
      const url = mapUrl(session);
      const tasks = Array.isArray(session.tasks) ? session.tasks : [];
      const hasStreet = !!session.street_hint;
      const streetLabel = [session.street_hint, session.city_hint].filter(Boolean).join(', ');
      const nearbyId = `nearby-${session.id}`;

      return `
        <section class="card" data-session-id="${session.id}">
          <div class="session-head">
            <div>
              <h2>${escapeHtml(session.volunteer_name || session.volunteer_email)}</h2>
              <div class="muted">${escapeHtml(session.volunteer_email)}${session.team_id ? ` | Team: ${escapeHtml(session.team_id)}` : ''}</div>
            </div>
            <div class="${isStale ? 'warn' : 'ok'}">
              ${session.sharing_enabled ? (isStale ? 'Location stale' : 'Location current') : 'Sharing off'}
            </div>
          </div>
          <p><strong>Location:</strong> ${escapeHtml(locationText)} ${url ? `<a href="${url}" target="_blank" rel="noopener">Open map</a>` : ''}</p>
          <p class="muted">Started: ${formatDate(session.started_at)} | Last location: ${formatDate(session.latest_location_at)}</p>
          <div class="toolbar">
            <button class="primary" type="button" data-add-task="call_ahead" data-session-id="${session.id}" data-help="Create a call-ahead task so support can call before the volunteer arrives.">Add call-ahead</button>
            <button class="secondary" type="button" data-add-task="next_stop" data-session-id="${session.id}" data-help="Create a confirmed next-stop task for this field volunteer.">Add next stop</button>
          </div>
          <h3>Tasks</h3>
          ${tasks.length ? tasks.map(renderTask).join('') : '<div class="empty">No tasks yet.</div>'}
          <div class="nearby-section">
            <h3>Nearby Voters</h3>
            ${hasStreet
              ? `<p class="street-hint">Street hint: <strong>${escapeHtml(streetLabel)}</strong>
                   &mdash; <button class="secondary" type="button" style="padding:.3rem .6rem;font-size:.82rem"
                     data-help="Load nearby voters for this volunteer's current street hint."
                     data-load-nearby="${session.id}">Load voters on this street</button>
                   <button class="secondary" type="button" style="padding:.3rem .6rem;font-size:.82rem"
                     data-help="Geocode up to 3 unresolved voter addresses on this street (admin tool)."
                     data-geocode-street="${session.id}">Geocode street (max 3)</button>
                 </p>`
              : `<p class="muted" style="font-size:.9rem">No street hint yet — field volunteer must share location first.</p>`
            }
            <div id="${nearbyId}"></div>
          </div>
        </section>
      `;
    }

    function renderNearbyTable(data, sessionId) {
      const voters = data.rows || [];
      const hasPhone = data.has_phone ?? voters.filter(v => v.phone_e164).length;
      const noPhone = data.no_phone ?? (voters.length - hasPhone);
      const methodLabels = { street_id: 'exact street match', street_name: 'name match', coordinates: 'GPS radius', coordinates_pending: 'GPS (no data yet)' };
      const matchMethod = methodLabels[data.method] || 'name match';

      if (!voters.length) return '<div class="empty">No voters found on this street.</div>';

      const summary = `
        <div class="phone-summary">
          <span class="phone-badge badge-phone">${hasPhone} with phone</span>
          <span class="phone-badge badge-nophone">${noPhone} no phone</span>
          <span class="match-method">(${escapeHtml(matchMethod)})</span>
        </div>`;

      const rows = voters.map(v => {
        const name = [v.first_name, v.last_name].filter(Boolean).join(' ') || '—';
        const addr = v.address || '—';
        const phone = v.phone_e164 || '';
        const phoneCell = phone
          ? `<a class="phone-link" href="tel:${escapeHtml(phone)}">${escapeHtml(phone)}</a>`
          : '<span class="no-phone">No phone on file</span>';
        const addrEsc = escapeHtml(addr);
        const phoneEsc = escapeHtml(phone);
        const nameEsc = escapeHtml(name);
        return `<tr>
          <td>${nameEsc}</td>
          <td>${addrEsc}</td>
          <td>${escapeHtml(v.city || '')}</td>
          <td>${phoneCell}</td>
          <td>
            ${phone ? `<button class="secondary quick-task-btn" type="button"
              data-help="Create a call-ahead task prefilled with this voter and phone number."
              data-quick-call="${sessionId}"
              data-addr="${addrEsc}"
              data-name="${nameEsc}"
              data-phone="${phoneEsc}">Call ahead</button>` : ''}
            <button class="secondary quick-task-btn" type="button"
              data-help="Create a next-stop task prefilled with this voter and address."
              data-quick-stop="${sessionId}"
              data-addr="${addrEsc}"
              data-name="${nameEsc}">Next stop</button>
          </td>
        </tr>`;
      }).join('');

      return summary + `<table class="nearby-table">
        <thead><tr><th>Name</th><th>Address</th><th>City</th><th>Phone</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function startCountdown() {
      clearInterval(countdownInterval);
      nextRefreshAt = Date.now() + AUTO_REFRESH_MS;
      countdownInterval = setInterval(() => {
        const remaining = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
        const m = Math.floor(remaining / 60);
        const s = String(remaining % 60).padStart(2, '0');
        countdownEl.textContent = `Auto-refresh in ${m}:${s}`;
        if (remaining === 0) clearInterval(countdownInterval);
      }, 1000);
    }

    function scheduleAutoRefresh() {
      clearTimeout(autoRefreshTimer);
      startCountdown();
      autoRefreshTimer = setTimeout(loadSessions, AUTO_REFRESH_MS);
    }

    async function loadSessions() {
      try {
        setStatus('Loading...', 'muted');
        const teamId = (teamFilterEl?.value || '').trim();
        const path = teamId ? `admin/field-sessions?team_id=${encodeURIComponent(teamId)}` : 'admin/field-sessions';
        const data = await window.apiGet(path);
        const sessions = data.sessions || [];
        const teams = Array.isArray(data.available_teams) ? data.available_teams : Array.from(new Set(sessions.map(s => s.team_id).filter(Boolean))).sort();
        if (teamFilterEl) {
          const current = teamFilterEl.value;
          teamFilterEl.innerHTML = '<option value="">All teams</option>' + teams.map(team => `<option value="${escapeHtml(team)}">${escapeHtml(team)}</option>`).join('');
          if (current && teams.includes(current)) {
            teamFilterEl.value = current;
          }
        }
        sessionsEl.innerHTML = sessions.length
          ? sessions.map(renderSession).join('')
          : '<div class="empty">No active field sessions.</div>';
        applyControlHelp(sessionsEl);
        setStatus(`Loaded ${sessions.length} active session${sessions.length === 1 ? '' : 's'}.`, 'ok');
        scheduleAutoRefresh();
      } catch (err) {
        setStatus(`Unable to load field sessions: ${err.message}`, 'error');
        scheduleAutoRefresh();
      }
    }

    async function ensureAdminIdentity() {
      if (currentAdminEmail) return currentAdminEmail;
      try {
        const data = await window.apiGet('admin/whoami');
        currentAdminEmail = String(data?.email || '').trim().toLowerCase();
      } catch {
        currentAdminEmail = '';
      }
      return currentAdminEmail;
    }

    async function loadNearbyVoters(sessionId) {
      const container = document.getElementById(`nearby-${sessionId}`);
      if (!container) return;
      container.innerHTML = '<p class="loading-nearby">Loading voters&hellip;</p>';
      try {
        const data = await window.apiGet(`admin/field-sessions/${sessionId}/nearby-voters`);
        container.innerHTML = renderNearbyTable(data, sessionId);
        applyControlHelp(container);
      } catch (err) {
        container.innerHTML = `<p class="error">Failed to load: ${escapeHtml(err.message)}</p>`;
      }
    }

    async function geocodeStreet(sessionId) {
      try {
        setStatus('Geocoding up to 3 unresolved street addresses...', 'warn');
        const data = await window.apiPost(`admin/field-sessions/${sessionId}/geocode-street`, { limit: 3 });
        const attempted = Number(data?.attempted || 0);
        const updated = Number(data?.updated || 0);
        const failed = Number(data?.failed || 0);
        setStatus(`Street geocode run complete: attempted ${attempted}, updated ${updated}, failed ${failed}.`, updated > 0 ? 'ok' : 'warn');
        await loadNearbyVoters(sessionId);
      } catch (err) {
        setStatus(`Unable to geocode street: ${err.message}`, 'error');
      }
    }

    async function addTask(sessionId, taskType, prefillTitle = '', prefillNotes = '') {
      const label = taskType === 'next_stop' ? 'confirmed next stop' : 'call-ahead task';
      const title = prompt(`Enter ${label}`, prefillTitle);
      if (!title) return;
      const notes = prompt('Notes (optional)', prefillNotes) || prefillNotes || '';
      try {
        await window.apiPost(`admin/field-sessions/${sessionId}/tasks`, {
          task_type: taskType,
          title,
          notes,
          status: taskType === 'next_stop' ? 'confirmed' : 'open',
        });
        await loadSessions();
      } catch (err) {
        setStatus(`Unable to add task: ${err.message}`, 'error');
      }
    }

    async function updateTask(taskId, status, expectedVersion) {
      try {
        await window.apiFetch(`admin/field-session-tasks/${taskId}`, {
          method: 'PATCH',
          body: { status, expected_version: expectedVersion },
        });
        await loadSessions();
      } catch (err) {
        if (err?.message?.includes('version_conflict')) {
          setStatus('Task changed by another supporter. Reloading latest state.', 'warn');
          await loadSessions();
          return;
        }
        setStatus(`Unable to update task: ${err.message}`, 'error');
      }
    }

    async function claimTask(taskId, expectedVersion) {
      try {
        await window.apiPost(`admin/field-session-tasks/${taskId}/claim`, { expected_version: expectedVersion });
        await loadSessions();
      } catch (err) {
        if (err?.message?.includes('version_conflict') || err?.message?.includes('already claimed')) {
          setStatus('Task changed by another supporter. Reloading latest state.', 'warn');
          await loadSessions();
          return;
        }
        setStatus(`Unable to claim task: ${err.message}`, 'error');
      }
    }

    async function releaseTask(taskId, expectedVersion) {
      try {
        await window.apiPost(`admin/field-session-tasks/${taskId}/release`, { expected_version: expectedVersion });
        await loadSessions();
      } catch (err) {
        if (err?.message?.includes('version_conflict')) {
          setStatus('Task changed by another supporter. Reloading latest state.', 'warn');
          await loadSessions();
          return;
        }
        setStatus(`Unable to release task: ${err.message}`, 'error');
      }
    }

    async function reassignTask(taskId, expectedVersion, currentAssignee) {
      const assignee = prompt('Assign to support email', currentAssignee || '');
      if (!assignee) return;
      try {
        await window.apiPost(`admin/field-session-tasks/${taskId}/reassign`, {
          expected_version: expectedVersion,
          assignee_email: assignee,
        });
        await loadSessions();
      } catch (err) {
        if (err?.message?.includes('version_conflict')) {
          setStatus('Task changed by another supporter. Reloading latest state.', 'warn');
          await loadSessions();
          return;
        }
        setStatus(`Unable to reassign task: ${err.message}`, 'error');
      }
    }

    sessionsEl.addEventListener('click', event => {
      const addButton = event.target.closest('[data-add-task]');
      if (addButton) {
        addTask(addButton.dataset.sessionId, addButton.dataset.addTask);
        return;
      }
      const statusButton = event.target.closest('[data-task-status]');
      if (statusButton) {
        updateTask(statusButton.dataset.taskId, statusButton.dataset.taskStatus, statusButton.dataset.taskVersion);
        return;
      }
      const claimButton = event.target.closest('[data-task-claim]');
      if (claimButton) {
        claimTask(claimButton.dataset.taskClaim, claimButton.dataset.taskVersion);
        return;
      }
      const releaseButton = event.target.closest('[data-task-release]');
      if (releaseButton) {
        releaseTask(releaseButton.dataset.taskRelease, releaseButton.dataset.taskVersion);
        return;
      }
      const reassignButton = event.target.closest('[data-task-reassign]');
      if (reassignButton) {
        reassignTask(reassignButton.dataset.taskReassign, reassignButton.dataset.taskVersion, reassignButton.dataset.taskAssignee);
        return;
      }
      const nearbyButton = event.target.closest('[data-load-nearby]');
      if (nearbyButton) {
        loadNearbyVoters(nearbyButton.dataset.loadNearby);
        return;
      }
      const geocodeButton = event.target.closest('[data-geocode-street]');
      if (geocodeButton) {
        geocodeStreet(geocodeButton.dataset.geocodeStreet);
        return;
      }
      const quickCall = event.target.closest('[data-quick-call]');
      if (quickCall) {
        const title = `${quickCall.dataset.name} — ${quickCall.dataset.addr}`;
        const notes = quickCall.dataset.phone ? `Phone: ${quickCall.dataset.phone}` : '';
        addTask(quickCall.dataset.quickCall, 'call_ahead', title, notes);
        return;
      }
      const quickStop = event.target.closest('[data-quick-stop]');
      if (quickStop) {
        const title = `${quickStop.dataset.name} — ${quickStop.dataset.addr}`;
        addTask(quickStop.dataset.quickStop, 'next_stop', title);
        return;
      }
    });

    refreshBtn.addEventListener('click', loadSessions);
    teamFilterEl?.addEventListener('change', loadSessions);
    applyControlHelp();
    ensureAdminIdentity().finally(loadSessions);
  </script>
</body>
</html>
